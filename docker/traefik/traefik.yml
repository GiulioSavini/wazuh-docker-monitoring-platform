# Traefik Static Configuration (alternative to NGINX)
# Enable with: docker compose --profile with-traefik up -d
api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: wazuh-net

tls:
  certificates:
    - certFile: /certs/traefik.pem
      keyFile: /certs/traefik-key.pem

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
