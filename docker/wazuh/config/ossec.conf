<!--
  Wazuh Manager Configuration
  Tuned for Docker monitoring platform with multi-source log ingestion.
-->
<ossec_config>

  <!-- Global settings -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.com</smtp_server>
    <email_from>wazuh@example.com</email_from>
    <email_to>security@example.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <queue_size>131072</queue_size>
  </global>

  <!-- Manager connection -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Syslog collector for vCenter / network devices -->
  <remote>
    <connection>syslog</connection>
    <port>1515</port>
    <protocol>udp</protocol>
    <allowed-ips>0.0.0.0/0</allowed-ips>
  </remote>

  <!-- Alerts -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Vulnerability detection -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- Indexer connection -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh-indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <key>/etc/ssl/filebeat-key.pem</key>
    </ssl>
  </indexer>

  <!-- File integrity monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories realtime="yes" check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories realtime="yes" check_all="yes">/bin,/sbin,/boot</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/prelink.cache</ignore>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- Rootcheck -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- Log collection: Docker daemon -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Docker listener (JSON logs from Docker daemon) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/docker.log</location>
    <label key="source">docker-daemon</label>
  </localfile>

  <!-- Active response -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
  </active-response>

  <!-- Auth settings for agent registration -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>yes</use_password>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>/etc/ssl/filebeat.pem</ssl_manager_cert>
    <ssl_manager_key>/etc/ssl/filebeat-key.pem</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <!-- Custom rules directories -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_dir>etc/rules</rule_dir>
    <rule_dir>etc/rules/custom-docker</rule_dir>
    <rule_dir>etc/rules/custom-vmware</rule_dir>
    <rule_dir>etc/rules/custom-aws</rule_dir>
    <rule_dir>etc/rules/custom-gcp</rule_dir>
    <rule_dir>etc/rules/custom-linux</rule_dir>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/blocked-ips</list>
    <list>etc/lists/approved-docker-images</list>
  </ruleset>

  <!-- AWS CloudTrail module -->
  <wodle name="aws-s3">
    <disabled>yes</disabled>
    <interval>10m</interval>
    <run_on_start>yes</run_on_start>
    <!-- Uncomment and configure per environment
    <bucket type="cloudtrail">
      <name>your-cloudtrail-bucket</name>
      <access_key>YOUR_ACCESS_KEY</access_key>
      <secret_key>YOUR_SECRET_KEY</secret_key>
      <region>us-east-1</region>
    </bucket>
    -->
  </wodle>

  <!-- GCP Pub/Sub module -->
  <wodle name="gcp-pubsub">
    <disabled>yes</disabled>
    <interval>5m</interval>
    <run_on_start>yes</run_on_start>
    <!-- Uncomment and configure per environment
    <project_id>your-project-id</project_id>
    <subscription_name>wazuh-audit-sub</subscription_name>
    <credentials_file>/var/ossec/etc/gcp-credentials.json</credentials_file>
    -->
  </wodle>

</ossec_config>
