# Production Inventory
# Update with your actual hosts before running playbooks.
all:
  vars:
    wazuh_manager_ip: "10.0.1.10"
    wazuh_manager_port: 1514
    wazuh_agent_version: "4.9.0"
    wazuh_registration_password: "{{ vault_wazuh_registration_password }}"

  children:
    linux_servers:
      hosts:
        web-prod-01:
          ansible_host: 10.0.1.21
          wazuh_agent_groups: "web,production"
        app-prod-01:
          ansible_host: 10.0.1.22
          wazuh_agent_groups: "app,production"
        db-prod-01:
          ansible_host: 10.0.1.23
          wazuh_agent_groups: "database,production"

    windows_servers:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
      hosts:
        dc-prod-01:
          ansible_host: 10.0.1.30
          ansible_user: "{{ vault_windows_admin_user }}"
          ansible_password: "{{ vault_windows_admin_password }}"
          wazuh_agent_groups: "dc,production"
        file-prod-01:
          ansible_host: 10.0.1.31
          ansible_user: "{{ vault_windows_admin_user }}"
          ansible_password: "{{ vault_windows_admin_password }}"
          wazuh_agent_groups: "fileserver,production"

    docker_hosts:
      hosts:
        docker-prod-01:
          ansible_host: 10.0.1.40
          wazuh_agent_groups: "docker,production"
        docker-prod-02:
          ansible_host: 10.0.1.41
          wazuh_agent_groups: "docker,production"
